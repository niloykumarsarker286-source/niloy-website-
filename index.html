<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(135deg, #0f172a, #1e293b);

}

/* HEADER */
header {
    text-align: center;
    padding: 30px;
}

/* CARD */
.card {
    width: 360px;
    margin: auto;
    background: #1e293b;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 0 20px black;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

/* PROFILE IMAGE PLACEHOLDER */
.profile-img {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 3px solid #38bdf8;
    object-fit: cover;
}

/* NAME */
h1 {
    color: #38bdf8;
    margin-top: 10px;
}

/* SECTION */
.section {
    width: 80%;
    margin: 25px auto;
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 0 10px black;
    text-align: center;
}

/* SOCIAL BUTTONS */
.social {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 15px;
}

.btn {
    display: inline-block;
    padding: 10px;
    border-radius: 8px;
    text-decoration: none;
    color: white;
    font-weight: bold;
}

/* COLORS */
.fb { background: #1877f2; }
.ig { background: #e1306c; }
.wa { background: #25d366; }

.btn:hover {
    opacity: 0.8;
}

</style>
