<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niloy Portfolio</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
    text-align: center;
}

/* Profile Image */
.profile-img {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    border: 4px solid #38bdf8;
    margin-top: 20px;
}

/* Name */
h1 {
    margin: 10px 0;
}

/* Card */
.card {
    background: #1e293b;
    margin: 20px;
    padding: 20px;
    border-radius: 12px;
}

/* Buttons */
.btn {
    display: inline-block;
    padding: 10px 20px;
    margin: 8px;
    border-radius: 8px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.fb { background: #1877f2; }
.ig { background: #e1306c; }
.wa { background: #25d366; }

.btn:hover {
    transform: scale(1.1);
}

/* Animation */
@keyframes fadeIn {
    from {opacity: 0; transform: translateY(20px);}
    to {opacity: 1; transform: translateY(0);}
}

.card {
    animation: fadeIn 1s ease-in-out;
}

/* Mobile Responsive */
@media(max-width: 600px) {
    h1 { font-size: 22px; }
    .card { margin: 10px; }
}
</style>

</head>

<body>

<img src="your-photo.jpg" class="profile-img">

<h1>Niloy Kumar Sarker</h1>
<p>CST Student | Kurigram Polytechnic Institute</p>

<div class="card">
    <h2>About Me</h2>
    <p>I am learning Web Development & Programming.</p>
</div>

<div class="card">
    <h2>Connect With Me</h2>

    <a class="btn fb" href="https://facebook.com/">Facebook</a>
    <a class="btn ig" href="https://instagram.com/">Instagram</a>
    <a class="btn wa" href="https://wa.me/8801300141286">WhatsApp</a>
</div>

</body>
</html>
